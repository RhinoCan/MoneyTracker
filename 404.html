<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <script>
      const path = window.location.pathname.replace('/MoneyTracker', '');
      const search = window.location.search;
      const hash = window.location.hash;
      window.location.replace(
        '/MoneyTracker/?p=' + encodeURIComponent(path) +
        (search ? '&q=' + encodeURIComponent(search.slice(1)) : '') +
        (hash ? '&h=' + encodeURIComponent(hash.slice(1)) : '')
      );
    </script>
  </head>
</html>
